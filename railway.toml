[build]
builder = "RAILPACK"
buildCommand = "cargo build --locked --release -p wave-control-rust"
watchPatterns = [
  "/services/wave-control-rust/**",
  "/crates/**",
  "/Cargo.toml",
  "/Cargo.lock",
]

[deploy]
startCommand = "./target/release/wave-control-rust"
healthcheckPath = "/healthz"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
