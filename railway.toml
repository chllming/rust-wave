[build]
builder = "RAILPACK"
buildCommand = "cargo build --locked --release -p rust-wave-control && install -m 755 target/release/rust-wave-control ./rust-wave-control"
watchPatterns = [
  "/services/wave-control-rust/**",
  "/crates/**",
  "/Cargo.toml",
  "/Cargo.lock",
]

[deploy]
startCommand = "./rust-wave-control"
healthcheckPath = "/healthz"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
